name: Build and Test

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Install Arduino AVR core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Install all required libraries
        run: |
          arduino-cli lib install "AccelStepper"   # Turbine (stepper motor)
          arduino-cli lib install "IRremote"        # IRReader
          arduino-cli lib install "Servo"           # ServoController
          arduino-cli lib install "NewPing"         # UltraSonicSensor

      - name: Compile sketch
        run: |
          arduino-cli compile --fqbn arduino:avr:uno ./WindTurbine
